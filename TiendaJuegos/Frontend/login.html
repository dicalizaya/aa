<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STORE.GG</title>
    <link rel="icon" href="../img/juegos/LOGO.png">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="login-page">

    <div class="login-wrapper">

        <div class="logo-container">
            <img src="../img/juegos/LOGO.png" alt="STORE.GG" class="brand-logo">
        </div>

        <h2>Iniciar Sesión</h2>

        <form id="loginForm">

            <div class="input-group">
                <label for="email">
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Ej: masterchief@gaming.com"
                    required>
            </div>

            <div class="input-group">
                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn-login">
                Ingresar a la tienda
            </button>

        </form>

        <p id="mensajeLogin"></p>

        <div class="login-footer">

            <p>
                ¿No tienes una cuenta?
                <a href="registrarse.html">
                    Regístrate aquí
                </a>
            </p>

            <p>
                <a href="interfazUsuario.html" class="back-home">
                    Volver a la tienda
                </a>
            </p>

        </div>

    </div>

    <script src="../JS/api.js"></script>
    <script src="../JS/auth.js"></script>

</body>

</html>
