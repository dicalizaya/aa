<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - STORE.GG</title>
    <link rel="icon" href="../img/juegos/LOGO.png">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="login-page">

    <div class="login-wrapper">

        <h2>Crear Cuenta</h2>

        <form id="registerForm">

            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input
                    type="text"
                    id="nombre"
                    required
                    placeholder="Ej: Juan">
            </div>

            <div class="input-group">
                <label for="apellido_paterno">
                    Apellido Paterno
                </label>

                <input
                    type="text"
                    id="apellido_paterno"
                    required
                    placeholder="Ej: Pérez">
            </div>

            <div class="input-group">
                <label for="apellido_materno">
                    Apellido Materno
                </label>

                <input
                    type="text"
                    id="apellido_materno"
                    required
                    placeholder="Ej: García">
            </div>

            <div class="input-group">
                <label for="email">
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    id="email"
                    required
                    placeholder="Ej: usuario@gmail.com">
            </div>

            <div class="input-group">
                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    minlength="8"
                    required
                    placeholder="Mínimo 8 caracteres">
            </div>

            <button type="submit" class="btn-login">
                Registrarse
            </button>

        </form>

        <p id="mensajeRegistro"></p>

        <div class="login-footer">

            <p>
                ¿Ya tienes una cuenta?
                <a href="login.html">
                    Iniciar Sesión
                </a>
            </p>

            <p>
                <a href="index.html"
                   class="back-home">
                    Volver a la tienda
                </a>
            </p>

        </div>

    </div>

    <script src="../JS/api.js"></script>
    <script src="../JS/auth.js"></script>

</body>
</html>
